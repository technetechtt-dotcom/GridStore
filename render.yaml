# Render Blueprint — GridMarket AI / GridStore
# Docs: https://render.com/docs/blueprint-spec

services:
  # Express API (auth, orders, listings) — connects to Neon via DATABASE_URL
  - type: web
    name: gridstore-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: ENABLE_DEMO_DATA
        value: "false"
      - key: ALLOW_SIMULATED_OAUTH
        value: "false"
      - key: REQUIRE_MFA
        value: "true"
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: gridstore-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_EXTRA_ORIGIN
        fromService:
          type: web
          name: gridstore-admin
          envVarKey: RENDER_EXTERNAL_URL
      - key: PUBLIC_WEB_URL
        fromService:
          type: web
          name: gridstore-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PUBLIC_ADMIN_URL
        fromService:
          type: web
          name: gridstore-admin
          envVarKey: RENDER_EXTERNAL_URL

  # Vite React SPA (static CDN)
  - type: web
    name: gridstore-web
    runtime: static
    buildCommand: >-
      npm ci &&
      VITE_API_BASE_URL="${API_HOST}/api"
      VITE_PUBLIC_WEB_URL="${WEB_HOST}"
      VITE_PUBLIC_ADMIN_URL="${ADMIN_HOST}"
      npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: gridstore-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEB_HOST
        fromService:
          type: web
          name: gridstore-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_HOST
        fromService:
          type: web
          name: gridstore-admin
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Standalone ops / admin dashboard (separate static deployment)
  - type: web
    name: gridstore-admin
    runtime: static
    buildCommand: >-
      npm ci &&
      VITE_API_BASE_URL="${API_HOST}/api"
      VITE_PUBLIC_WEB_URL="${WEB_HOST}"
      VITE_PUBLIC_ADMIN_URL="${ADMIN_HOST}"
      VITE_ADMIN_BASE_PATH=""
      npm run build:admin
    staticPublishPath: dist-admin
    pullRequestPreviewsEnabled: true
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: gridstore-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEB_HOST
        fromService:
          type: web
          name: gridstore-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_HOST
        fromService:
          type: web
          name: gridstore-admin
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
