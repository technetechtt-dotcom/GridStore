# Render Blueprint — GridMarket AI / GridStore
# Docs: https://render.com/docs/blueprint-spec

services:
  # Express API (auth, orders, listings) — connects to Neon via DATABASE_URL
  - type: web
    name: gridstore-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: gridstore-web
          envVarKey: RENDER_EXTERNAL_URL

  # Vite React SPA (static CDN)
  - type: web
    name: gridstore-web
    runtime: static
    buildCommand: npm ci && VITE_API_BASE_URL="${API_HOST}/api" npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: gridstore-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
